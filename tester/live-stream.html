<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VMT Live Stream — Web Test</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #0d0d0d; color: #fff; min-height: 100vh; }
    .screen { display: none; }
    .screen.active { display: flex; }

    /* ── LOGIN ── */
    #loginScreen { justify-content: center; align-items: center; height: 100vh; background: #111; }
    .card { background: #1e1e1e; border-radius: 16px; padding: 36px; width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,.5); }
    .card h2 { text-align: center; margin-bottom: 6px; font-size: 22px; }
    .card p  { text-align: center; color: #888; font-size: 13px; margin-bottom: 24px; }
    input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid #333; background: #2a2a2a; color: #fff; font-size: 14px; margin-bottom: 12px; outline: none; }
    input:focus { border-color: #0a84ff; }
    .btn { padding: 12px 18px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
    .btn:active { opacity: .75; }
    .btn-primary { background: #0a84ff; color: #fff; }
    .btn-green   { background: #30d158; color: #fff; }
    .btn-red     { background: #ff453a; color: #fff; }
    .btn-gray    { background: #3a3a3c; color: #fff; }
    .btn-orange  { background: #ff9f0a; color: #fff; }
    .btn-full    { width: 100%; }
    .err { color: #ff453a; font-size: 13px; text-align: center; margin-top: 8px; min-height: 18px; }

    /* ── ROLE SELECT ── */
    #roleScreen { justify-content: center; align-items: center; height: 100vh; flex-direction: column; background: #111; gap: 16px; }
    #roleScreen h2 { font-size: 20px; margin-bottom: 8px; }
    .role-btn { width: 280px; padding: 18px; border-radius: 14px; font-size: 16px; font-weight: 700; border: none; cursor: pointer; }

    /* ── HOST SCREEN ── */
    #hostScreen { flex-direction: column; height: 100vh; background: #000; position: relative; }
    #hostVideo { width: 100%; flex: 1; object-fit: cover; background: #111; }
    .host-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; }
    .host-top { position: absolute; top: 16px; left: 16px; right: 16px; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: all; }
    .live-badge { background: #e0001a; border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #fff; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    .viewer-pill { background: rgba(0,0,0,.6); border-radius: 20px; padding: 6px 14px; font-size: 13px; display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .host-bottom { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px; background: linear-gradient(transparent, rgba(0,0,0,.85)); pointer-events: all; }
    .chat-scroll { max-height: 160px; overflow-y: auto; margin-bottom: 10px; }
    .chat-msg { font-size: 13px; margin-bottom: 4px; background: rgba(0,0,0,.5); border-radius: 12px; padding: 5px 10px; display: inline-block; max-width: 90%; }
    .chat-msg .name { color: #4FC3F7; font-weight: 700; }
    .chat-msg.system { color: rgba(255,255,255,.55); font-style: italic; background: transparent; padding: 2px 4px; }
    .chat-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .chat-input-row input { flex: 1; margin: 0; padding: 10px 14px; font-size: 13px; }
    .ctrl-row { display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap; }
    .reactions-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 10px; }
    .emoji-btn { background: rgba(255,255,255,.15); border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 20px; cursor: pointer; }
    .float-reaction { position: absolute; bottom: 160px; font-size: 28px; animation: float 2.8s ease-out forwards; pointer-events: none; }
    @keyframes float { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-240px);opacity:0} }

    /* ── VIEWER MODAL ── */
    .modal-overlay { position: fixed; top:0;left:0;right:0;bottom:0; background: rgba(0,0,0,.6); z-index: 100; display: flex; align-items: flex-end; }
    .modal-box { background: #1a1a1a; border-radius: 18px 18px 0 0; padding: 20px; width: 100%; max-height: 50vh; overflow-y: auto; }
    .modal-box h3 { font-size: 16px; margin-bottom: 14px; }
    .viewer-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.08); font-size: 14px; }
    .v-avatar { width: 32px; height: 32px; border-radius: 50%; background: #0a84ff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; }

    /* ── VIEWER SCREEN ── */
    #viewerScreen { flex-direction: column; height: 100vh; background: #000; position: relative; }
    #viewerVideo { width: 100%; flex: 1; object-fit: cover; background: #111; }
    .host-away-overlay { position: absolute; top:0;left:0;right:0;bottom:0; background: rgba(0,0,0,.65); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 10; }
    .spinner { width: 44px; height: 44px; border: 4px solid rgba(255,255,255,.2); border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .viewer-top { position: absolute; top: 16px; left: 16px; right: 16px; display: flex; justify-content: space-between; align-items: center; z-index: 5; }
    .viewer-bottom { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px; background: linear-gradient(transparent, rgba(0,0,0,.85)); z-index: 5; }
    .waiting-box { position: absolute; top:0;left:0;right:0;bottom:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; background:#0a0a0a; }
    .waiting-box p { color: #888; font-size: 14px; }

    /* ── STREAM ENDED ── */
    #endedScreen { justify-content: center; align-items: center; height: 100vh; flex-direction: column; gap: 16px; background: #111; }
    #endedScreen h2 { font-size: 22px; }
    #endedScreen p  { color: #888; font-size: 14px; }

    /* ── LOG ── */
    #logBox { position: fixed; bottom: 0; right: 0; width: 300px; max-height: 160px; overflow-y: auto; background: rgba(0,0,0,.85); font-size: 10px; padding: 6px; font-family: monospace; color: #0f0; z-index: 200; border-top-left-radius: 8px; }
  </style>
</head>
<body>

<!-- ══════════════════ LOGIN ══════════════════ -->
<div id="loginScreen" class="screen active">
  <div class="card">
    <h2>🎥 VMT Live Stream</h2>
    <p>Web Test Client</p>
    <input id="emailInput"    type="email"    placeholder="Email" />
    <input id="passwordInput" type="password" placeholder="Password" />
    <button class="btn btn-primary btn-full" onclick="login()">Login</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- ══════════════════ ROLE SELECT ══════════════════ -->
<div id="roleScreen" class="screen">
  <h2 id="roleGreet">Welcome!</h2>
  <button class="role-btn btn-green" onclick="goHost()">🎬 Go Live (Host)</button>
  <button class="role-btn btn-primary" style="margin-top:4px" onclick="goViewer()">👁 Watch a Stream (Viewer)</button>
  <button class="role-btn btn-orange" style="margin-top:4px;display:none" id="resumeBtn" onclick="resumeStream()">🔄 Resume Stream</button>
  <button class="role-btn" style="margin-top:4px;background:#9C27B0" onclick="loadMyDays()">📺 My Days (Live Streams)</button>
</div>

<!-- ══════════════════ HOST SCREEN ══════════════════ -->
<div id="hostScreen" class="screen">
  <video id="hostVideo" autoplay muted playsinline></video>

  <div class="host-overlay">
    <!-- TOP BAR -->
    <div class="host-top">
      <div>
        <div class="live-badge" id="liveBadge" style="display:none">
          <div class="live-dot"></div> LIVE
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="viewer-pill" onclick="toggleViewerModal()" id="viewerPill" style="display:none">
          👁 <span id="hostViewerCount">0</span>
        </div>
        <button class="btn btn-red" style="padding:8px 14px;font-size:13px;display:none" onclick="endStream()" id="endBtn">End Stream</button>
      </div>
    </div>

    <!-- BOTTOM -->
    <div class="host-bottom">
      <!-- Reactions -->
      <div class="reactions-row" id="hostReactionsRow" style="display:none">
        <button class="emoji-btn" onclick="sendReaction('❤️')">❤️</button>
        <button class="emoji-btn" onclick="sendReaction('🔥')">🔥</button>
        <button class="emoji-btn" onclick="sendReaction('👍')">👍</button>
        <button class="emoji-btn" onclick="sendReaction('😂')">😂</button>
        <button class="emoji-btn" onclick="sendReaction('😮')">😮</button>
        <button class="emoji-btn" onclick="sendReaction('👏')">👏</button>
      </div>

      <!-- Chat -->
      <div class="chat-scroll" id="hostChat"></div>
      <div class="chat-input-row" id="hostChatRow" style="display:none">
        <input id="hostChatInput" placeholder="Comment…" onkeydown="if(event.key==='Enter')sendChat('host')" />
        <button class="btn btn-primary" onclick="sendChat('host')">Send</button>
      </div>

      <!-- Controls -->
      <div class="ctrl-row">
        <button class="btn btn-gray" id="createBtn" onclick="createAndGoLive()">🔴 Go Live</button>
        <button class="btn btn-gray" id="muteBtn" onclick="toggleMute()" style="display:none">🎤 Mute</button>
        <button class="btn btn-gray" id="videoBtn" onclick="toggleVideo()" style="display:none">📷 Video Off</button>
        <button class="btn btn-gray" onclick="showScreen('roleScreen')">← Back</button>
      </div>
    </div>
  </div>

  <!-- Floating reactions container -->
  <div id="hostFloats" style="position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden;"></div>
</div>

<!-- ══════════════════ VIEWER MODAL ══════════════════ -->
<div class="modal-overlay" id="viewerModal" style="display:none" onclick="if(event.target===this)toggleViewerModal()">
  <div class="modal-box">
    <h3>Viewers (<span id="modalViewerCount">0</span>)</h3>
    <div id="viewerList"><p style="color:#888;font-size:13px">No viewers yet</p></div>
  </div>
</div>

<!-- ══════════════════ VIEWER SCREEN ══════════════════ -->
<div id="viewerScreen" class="screen">
  <video id="viewerVideo" autoplay playsinline></video>

  <!-- Host Away Overlay -->
  <div class="host-away-overlay" id="hostAwayOverlay" style="display:none">
    <div class="spinner"></div>
    <p style="font-size:15px;font-weight:600">Host is away, please wait...</p>
  </div>

  <!-- Waiting for stream -->
  <div class="waiting-box" id="waitingBox">
    <div class="spinner"></div>
    <p>Connecting to stream…</p>
  </div>

  <!-- TOP -->
  <div class="viewer-top">
    <div class="live-badge"><div class="live-dot"></div> LIVE</div>
    <div class="viewer-pill">👁 <span id="viewerCountDisplay">0</span></div>
  </div>

  <!-- BOTTOM -->
  <div class="viewer-bottom">
    <div class="reactions-row">
      <button class="emoji-btn" onclick="sendReaction('❤️')">❤️</button>
      <button class="emoji-btn" onclick="sendReaction('🔥')">🔥</button>
      <button class="emoji-btn" onclick="sendReaction('👍')">👍</button>
      <button class="emoji-btn" onclick="sendReaction('😂')">😂</button>
      <button class="emoji-btn" onclick="sendReaction('😮')">😮</button>
      <button class="emoji-btn" onclick="sendReaction('👏')">👏</button>
    </div>
    <div class="chat-scroll" id="viewerChat"></div>
    <div class="chat-input-row">
      <input id="viewerChatInput" placeholder="Comment…" onkeydown="if(event.key==='Enter')sendChat('viewer')" />
      <button class="btn btn-primary" onclick="sendChat('viewer')">Send</button>
    </div>
    <div class="ctrl-row">
      <button class="btn btn-red" onclick="leaveStream()">Leave</button>
    </div>
  </div>

  <!-- Viewer floating reactions -->
  <div id="viewerFloats" style="position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden;"></div>
</div>

<!-- ══════════════════ JOIN SCREEN ══════════════════ -->
<div id="joinScreen" class="screen" style="justify-content:center;align-items:center;height:100vh;background:#111;flex-direction:column;gap:14px;">
  <div class="card">
    <h2>📺 Join a Stream</h2>
    <p>Enter the Stream ID from host</p>
    <input id="streamIdInput" placeholder="Stream ID" />
    <button class="btn btn-primary btn-full" onclick="joinStream()">Join Stream</button>
    <button class="btn btn-gray btn-full" style="margin-top:8px" onclick="showScreen('roleScreen')">← Back</button>
    <div class="err" id="joinErr"></div>
  </div>
</div>

<!-- ══════════════════ ENDED ══════════════════ -->
<div id="endedScreen" class="screen">
  <h2>📵 Stream Ended</h2>
  <p id="endedMsg">The host has ended this live stream.</p>
  <button class="btn btn-primary" onclick="showScreen('roleScreen')">Back to Home</button>
</div>

<!-- ══════════════════ MY DAYS / STREAMS ══════════════════ -->
<div id="myDaysScreen" class="screen" style="flex-direction:column;height:100vh;background:#0d0d0d;padding:16px;overflow-y:auto;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
    <h2 style="font-size:20px;">📺 Live Streams</h2>
    <button class="btn btn-primary" onclick="showScreen('roleScreen')">← Home</button>
  </div>
  <div id="streamsList" style="display:flex;gap:14px;flex-wrap:wrap;"></div>
</div>

<!-- ══════════════════ LIVE INDICATOR MODAL ══════════════════ -->
<div id="liveIndicatorModal" style="position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);display:none;z-index:500;padding:20px;border-top:1px solid #333;">
  <div style="background:#1a1a1a;border-radius:12px;padding:20px;max-width:600px;margin:0 auto;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
      <div style="width:8px;height:8px;border-radius:50%;background:#e0001a;animation:blink 1s infinite;"></div>
      <span style="color:#fff;font-weight:700;font-size:14px;letter-spacing:1px;">LIVE</span>
    </div>
    <div style="color:#fff;font-size:16px;font-weight:600;margin-bottom:14px;" id="liveStreamTitle">Your Live Stream</div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-primary" onclick="goBackToHostScreen()" style="flex:1;">← Go Back</button>
      <button class="btn btn-red" onclick="showEndStreamConfirm()" style="flex:1;">Cancel Stream</button>
    </div>
  </div>
</div>

<!-- ══════════════════ LOG ══════════════════ -->
<div id="logBox"></div>

<script>
const API = 'https://api.vmeeta.com';
const ICE_SERVERS = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:turn.vmeeta.com:3478' },
  ]
};

// ── State ──────────────────────────────────────────────────────────────────
let token        = null;
let currentUser  = null;
let socket       = null;
let role         = null; // 'host' | 'viewer'
let streamId     = null;
let localStream  = null;
let peerConns    = {};   // host: viewerId→PC  |  viewer: single PC
let isMuted      = false;
let isVideoOff   = false;
let viewers      = {};   // userId → userName
let currentStreamId = null;
let pendingIceCandidates = []; // queue ICE candidates that arrive before PC is ready

// ── NEW: Background Streaming State ────────────────────────────────────────
let isHostStreaming = false;
let activeLiveStream = null; // { streamId, streamTitle, hostInfo }
let liveStreams = []; // list of all active live streams

// ── Logging ────────────────────────────────────────────────────────────────
function log(msg, color) {
  const el = document.getElementById('logBox');
  const line = document.createElement('div');
  line.style.color = color || '#0f0';
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
  console.log(msg);
}

// ── Screen helper ──────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Auth ───────────────────────────────────────────────────────────────────
async function login() {
  const email    = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value.trim();
  document.getElementById('loginErr').textContent = '';
  if (!email || !password) { document.getElementById('loginErr').textContent = 'Fill in all fields'; return; }

  try {
    const res  = await fetch(`${API}/email/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || data.error || 'Login failed');

    token       = data.accessToken;
    currentUser = data.user;
    if (!currentUser) throw new Error('Login response missing user data');

    log(`✅ Logged in as ${currentUser.fullName || currentUser.username || email}`);

    document.getElementById('roleGreet').textContent = `Hi ${currentUser.fullName || currentUser.username || 'User'} 👋`;
    connectSocket();
    showScreen('roleScreen');

    // Check if there's a stream to resume
    const savedStreamId = localStorage.getItem('lastStreamId');
    if (savedStreamId) {
      document.getElementById('resumeBtn').style.display = 'block';
      log(`💾 Resumable stream found: ${savedStreamId}`);
    }
  } catch(e) {
    document.getElementById('loginErr').textContent = e.message;
    log(`❌ Login error: ${e.message}`, '#f55');
  }
}

// ── Socket ─────────────────────────────────────────────────────────────────
function connectSocket() {
  socket = io(API, { transports: ['websocket', 'polling'], reconnection: true });

  socket.on('connect', () => {
    log(`🔌 Socket connected: ${socket.id}`);
    socket.emit('presence:online', { userId: currentUser.id });
  });

  socket.on('disconnect', () => log('❌ Socket disconnected', '#f55'));

  // ── Viewer count ──
  socket.on('livestream_viewer_count', (data) => {
    const count = data?.count ?? 0;
    document.getElementById('hostViewerCount').textContent  = count;
    document.getElementById('viewerCountDisplay').textContent = count;
    log(`👁 Viewer count: ${count}`);
  });

  // ── Viewer joined (host side) ──
  socket.on('livestream_viewer_joined', async (data) => {
    const { userId: vId, userName: vName, viewerCount } = data;
    log(`👤 Viewer joined: ${vName} (${vId})`);

    // Update viewer count
    if (viewerCount !== undefined) {
      document.getElementById('hostViewerCount').textContent = viewerCount;
    }

    // Update viewers map
    if (vId && vName) {
      viewers[vId] = vName;
      updateViewerList();
    }

    // System chat message
    addChatMessage('host', null, `${vName} joined`, true);

    // WebRTC — send offer to viewer
    if (role === 'host' && localStream) {
      await createOfferForViewer(vId);
    }
  });

  // ── Viewer left (host side) ──
  socket.on('livestream_viewer_left', (data) => {
    const { userId: vId, viewerCount } = data;
    if (viewerCount !== undefined) {
      document.getElementById('hostViewerCount').textContent = viewerCount;
      document.getElementById('viewerCountDisplay').textContent = viewerCount;
    }
    if (vId && viewers[vId]) {
      const name = viewers[vId];
      delete viewers[vId];
      updateViewerList();
      addChatMessage('host', null, `${name} left`, true);
    }
    // Close peer conn
    if (peerConns[vId]) { try { peerConns[vId].close(); } catch{} delete peerConns[vId]; }
    log(`👤 Viewer left: ${vId}`);
  });

  // ── WebRTC signaling (viewer receives offer) ──
  socket.on('livestream_offer', async (data) => {
    if (role !== 'viewer') return;
    const { fromUserId: hostId, offer } = data;
    log(`📨 Offer received from host ${hostId}`);
    await handleViewerOffer(hostId, offer);
  });

  // ── WebRTC signaling (host receives answer) ──
  socket.on('livestream_answer', async (data) => {
    if (role !== 'host') return;
    const { fromUserId: vId, answer } = data;
    const pc = peerConns[vId];
    if (pc) {
      await pc.setRemoteDescription(new RTCSessionDescription(answer));
      log(`✅ Answer set for viewer ${vId}`);
    }
  });

  // ── ICE candidates ──
  socket.on('livestream_ice_candidate', async (data) => {
    const { fromUserId, candidate } = data;
    if (role === 'host') {
      const pc = peerConns[fromUserId];
      if (pc && candidate) {
        try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); }
        catch(e) { log(`⚠️ ICE error: ${e.message}`, '#fa0'); }
      }
    } else {
      // viewer: queue if PC not ready yet
      const pc = peerConns['host'];
      if (pc && pc.remoteDescription && candidate) {
        try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); }
        catch(e) { log(`⚠️ ICE error: ${e.message}`, '#fa0'); }
      } else if (candidate) {
        pendingIceCandidates.push(candidate);
        log(`📦 ICE candidate queued (${pendingIceCandidates.length})`);
      }
    }
  });

  // ── Chat ──
  socket.on('livestream_new_chat', (msg) => {
    const name = msg.user?.fullName || msg.user?.username || 'Viewer';
    addChatMessage('both', name, msg.content);
    log(`💬 Chat: ${name}: ${msg.content}`);
  });

  // ── Reactions ──
  socket.on('livestream_new_reaction', (data) => {
    spawnFloatingReaction(data.emoji);
    log(`😍 Reaction: ${data.emoji}`);
  });

  // ── Host away / back (viewer side) ──
  socket.on('livestream_host_away', () => {
    log('⚠️ Host is away', '#fa0');
    document.getElementById('hostAwayOverlay').style.display = 'flex';
  });

  socket.on('livestream_host_back', () => {
    log('✅ Host is back');
    document.getElementById('hostAwayOverlay').style.display = 'none';
  });

  // ── Stream ended ──
  socket.on('livestream_ended', ({ streamId: sId }) => {
    log(`📵 Stream ended: ${sId}`, '#f55');
    if (role === 'viewer') {
      cleanupViewer();
      document.getElementById('endedMsg').textContent =
        `${document.getElementById('viewerScreen').dataset.hostName || 'The host'} has ended this live stream.`;
      showScreen('endedScreen');
    }
    if (role === 'host') {
      localStorage.removeItem('lastStreamId');
      showScreen('endedScreen');
    }
  });

  // ── Viewer joined confirmation ──
  socket.on('livestream_joined', (data) => {
    log(`✅ Joined stream, viewers: ${data.viewerCount}`);
    document.getElementById('viewerCountDisplay').textContent = data.viewerCount || 0;
    document.getElementById('waitingBox').style.display = 'none';
  });

  // ── Error ──
  socket.on('livestream_error', ({ message }) => {
    log(`❌ Stream error: ${message}`, '#f55');
    alert(`Stream Error: ${message}`);
  });
}

// ── Role Selection ─────────────────────────────────────────────────────────
async function goHost() {
  role = 'host';
  showScreen('hostScreen');
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    document.getElementById('hostVideo').srcObject = localStream;

  } catch(e) {
    log(`⚠️ Real camera unavailable (${e.message}) — using fake camera`, '#fa0');

}

async function resumeStream() {

  if (!resumeId) { alert('No stream to resume'); return; }

  role = 'host';
  showScreen('hostScreen');
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    document.getElementById('hostVideo').srcObject = localStream;

  } catch(e) {
    log(`⚠️ Real camera unavailable (${e.message}) — using fake camera`, '#fa0');
    localStream = createFakeStream();

function createFakeStream() {
  // Canvas-based fake video track
  const canvas = document.createElement('canvas');
  canvas.width = 640; canvas.height = 480;
  const ctx = canvas.getContext('2d');
  let frame = 0;

  function draw() {
    frame++;
    // Animated gradient background
    const grad = ctx.createLinearGradient(0, 0, 640, 480);
    grad.addColorStop(0, `hsl(${frame % 360}, 70%, 20%)`);
    grad.addColorStop(1, `hsl(${(frame + 120) % 360}, 70%, 10%)`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 640, 480);

    // VMT label
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = 'bold 48px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🎥 VMT LIVE', 320, 200);

    // Time
    ctx.font = '22px monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText(new Date().toLocaleTimeString(), 320, 260);

    // Fake camera label
    ctx.font = '16px sans-serif';
    ctx.fillStyle = 'rgba(255,165,0,0.8)';
    ctx.fillText('[ Fake Camera — No real camera available ]', 320, 320);

    requestAnimationFrame(draw);
  }
  draw();

  const videoTrack = canvas.captureStream(30).getVideoTracks()[0];

  // Silent audio track
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const dest = audioCtx.createMediaStreamDestination();
  const osc = audioCtx.createOscillator();
  osc.frequency.value = 0;
  osc.connect(dest);
  osc.start();
  const audioTrack = dest.stream.getAudioTracks()[0];

  return new MediaStream([videoTrack, audioTrack]);
}

function goViewer() {
  role = 'viewer';
  showScreen('joinScreen');
}

// ── Create & Go Live ───────────────────────────────────────────────────────

  document.getElementById('createBtn').disabled = true;

  try {
    // 1. Create stream

    streamId = createRes.stream.id;
    currentStreamId = streamId;
    localStorage.setItem('lastStreamId', streamId); // Save for resume
    log(`✅ Stream created: ${streamId}`);

    // Show stream ID so viewer can use it

    idDiv.style.cssText = 'position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#1e1e1e;padding:10px 18px;border-radius:10px;font-size:13px;z-index:999;text-align:center;border:1px solid #333;';
    idDiv.innerHTML = `Stream ID: <b style="color:#0a84ff;user-select:all">${streamId}</b><br><span style="color:#888;font-size:11px">Share this with viewers</span>`;
    document.body.appendChild(idDiv);

    // 2. Go live (REST)
    await api('POST', `/api/livestream/${streamId}/go-live`, {});

    });

    document.getElementById('hostChatRow').style.display = 'flex';
    document.getElementById('muteBtn').style.display = 'block';
    document.getElementById('videoBtn').style.display = 'block';

  } catch(e) {
    log(`❌ Go live error: ${e.message}`, '#f55');

    document.getElementById('createBtn').textContent = '🔴 Go Live';
    document.getElementById('createBtn').disabled = false;
  }

// ── Host: Create offer for viewer ──────────────────────────────────────────
async function createOfferForViewer(viewerId) {
  if (peerConns[viewerId]) return; // already exists
  const pc = new RTCPeerConnection(ICE_SERVERS);
  peerConns[viewerId] = pc;

  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  pc.onicecandidate = ({ candidate }) => {
    if (candidate) {
      socket.emit('livestream_ice_candidate', { streamId, targetUserId: viewerId, candidate });
    }
  };

  pc.onconnectionstatechange = () => {
    log(`🔗 Viewer ${viewerId} state: ${pc.connectionState}`);
    if (['disconnected','failed','closed'].includes(pc.connectionState)) {
      delete peerConns[viewerId];
      try { pc.close(); } catch{}
    }
  };

  const offer = await pc.createOffer({ offerToReceiveAudio: true, offerToReceiveVideo: true });
  await pc.setLocalDescription(offer);
  socket.emit('livestream_offer', { streamId, targetUserId: viewerId, offer });
  log(`📤 Offer sent to viewer ${viewerId}`);
}

// ── End Stream ─────────────────────────────────────────────────────────────
async function endStream() {
  try {
    await api('POST', `/api/livestream/${streamId}/end`, {});
    socket.emit('livestream_host_end', { streamId, userId: currentUser.id });
    localStorage.removeItem('lastStreamId'); // Clear resume data

    // NEW: Clear host streaming state
    setHostStreaming(false);

    cleanupHost();
    showScreen('endedScreen');
    log('📵 Stream ended by host');
  } catch(e) {
    log(`❌ End stream error: ${e.message}`, '#f55');
  }
}

function cleanupHost() {
  Object.values(peerConns).forEach(pc => { try { pc.close(); } catch{} });
  peerConns = {};
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
}

// ── NEW: Background Streaming & Live Indicator ─────────────────────────────
function updateLiveIndicator() {
  const modal = document.getElementById('liveIndicatorModal');
  if (isHostStreaming && activeLiveStream) {
    modal.style.display = 'block';
    document.getElementById('liveStreamTitle').textContent = activeLiveStream.streamTitle || 'Your Live Stream';
    log('🔴 Live indicator shown');
  } else {
    modal.style.display = 'none';
    log('🔴 Live indicator hidden');
  }
}

function setHostStreaming(streaming, streamInfo) {
  isHostStreaming = streaming;
  if (streaming) {
    activeLiveStream = streamInfo;
    log(`✅ Host streaming started: ${streamInfo.streamTitle}`);
  } else {
    activeLiveStream = null;
    log('✅ Host streaming stopped');
  }
  updateLiveIndicator();
}

function goBackToHostScreen() {
  if (isHostStreaming && role === 'host') {
    showScreen('hostScreen');
    log('← Back to host screen (stream still active)');
  } else {
    showScreen('roleScreen');
  }
}

function showEndStreamConfirm() {
  if (!confirm('End your live stream?')) return;
  endStream();
}

// ── MY DAYS: Load and display live streams ─────────────────────────────────
async function loadMyDays() {
  try {
    const res = await api('GET', `/api/livestream/live`, null);
    liveStreams = res.success ? (res.streams || []) : [];
    displayMyDaysStreams();
    showScreen('myDaysScreen');
  } catch(e) {
    log(`❌ Load streams error: ${e.message}`, '#f55');
  }
}

function displayMyDaysStreams() {
  const container = document.getElementById('streamsList');
  container.innerHTML = '';

  if (liveStreams.length === 0) {
    container.innerHTML = '<p style="color:#888;">No live streams available</p>';
    return;
  }

  liveStreams.forEach(stream => {
    const isYourStream = stream.host?.id === currentUser?.id;
    const hostName = isYourStream ? 'You' : (stream.host?.fullName || stream.host?.username || 'Host');

    const card = document.createElement('div');
    card.style.cssText = `
      background:#1a1a1a;border-radius:12px;padding:12px;width:160px;cursor:pointer;
      transition:transform .2s;
    `;
    card.onmouseenter = () => card.style.transform = 'scale(1.05)';
    card.onmouseleave = () => card.style.transform = 'scale(1)';
    card.onclick = () => {
      if (isYourStream) {
        streamId = stream.id;
        role = 'host';
        showScreen('hostScreen');
        log(`🔙 Resumed your stream: ${stream.id}`);
      } else {
        document.getElementById('streamIdInput').value = stream.id;
        joinStream();
      }
    };

    card.innerHTML = `
      <div style="width:100%;height:100px;background:#2a2a2a;border-radius:8px;margin-bottom:8px;display:flex;align-items:center;justify-content:center;">
        <span style="font-size:36px;">🎥</span>
      </div>
      <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${hostName}</div>
      <div style="font-size:11px;color:#888;">👥 ${stream.viewerCount || 0} viewers</div>
    `;

    container.appendChild(card);
  });
}

// ── Join Stream (Viewer) ───────────────────────────────────────────────────
async function joinStream() {
  const sid = document.getElementById('streamIdInput').value.trim();
  document.getElementById('joinErr').textContent = '';
  if (!sid) { document.getElementById('joinErr').textContent = 'Enter Stream ID'; return; }

  streamId = sid;
  currentStreamId = sid;

  try {
    const res = await api('POST', `/api/livestream/${sid}/join`, {});
    log(`✅ Joined stream: ${sid}, viewers: ${res.stream?.viewerCount}`);

    document.getElementById('viewerCountDisplay').textContent = res.stream?.viewerCount || 0;
    document.getElementById('viewerScreen').dataset.hostName = res.stream?.host?.fullName || 'Host';

    showScreen('viewerScreen');
    document.getElementById('waitingBox').style.display = 'flex';

    socket.emit('presence:online', { userId: currentUser.id });
    socket.emit('livestream_viewer_join', {
      streamId: sid,
      userId:         currentUser.id,
      userName:       currentUser.fullName || currentUser.username,
      userProfilePic: currentUser.profilePic || '',
    });
  } catch(e) {
    document.getElementById('joinErr').textContent = e.message;
    log(`❌ Join error: ${e.message}`, '#f55');
  }
}

// ── Viewer: Handle offer from host ─────────────────────────────────────────
async function handleViewerOffer(hostId, offer) {
  // Close existing PC
  if (peerConns['host']) { try { peerConns['host'].close(); } catch{} }

  pendingIceCandidates = []; // reset queue for new connection
  const pc = new RTCPeerConnection(ICE_SERVERS);
  peerConns['host'] = pc;

  pc.ontrack = (e) => {
    log('🎥 Remote stream received!');
    if (e.streams?.[0]) {
      document.getElementById('viewerVideo').srcObject = e.streams[0];
      document.getElementById('waitingBox').style.display = 'none';
    }
  };

  pc.onicecandidate = ({ candidate }) => {
    if (candidate) {
      socket.emit('livestream_ice_candidate', { streamId, targetUserId: hostId, candidate });
    }
  };

  pc.onconnectionstatechange = () => {
    log(`🔗 Host connection state: ${pc.connectionState}`);
  };

  await pc.setRemoteDescription(new RTCSessionDescription(offer));

  // Drain globally queued ICE candidates that arrived before PC was ready
  if (pendingIceCandidates.length > 0) {
    log(`📦 Draining ${pendingIceCandidates.length} queued ICE candidates`);
    for (const c of pendingIceCandidates) {
      try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch{}
    }
    pendingIceCandidates = [];
  }

  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  socket.emit('livestream_answer', { streamId, targetUserId: hostId, answer });
  log('📤 Answer sent to host');
}

// ── Leave Stream (Viewer) ──────────────────────────────────────────────────
async function leaveStream() {
  cleanupViewer();
  try { await api('POST', `/api/livestream/${streamId}/leave`, {}); } catch{}
  socket.emit('livestream_viewer_leave', { streamId, userId: currentUser.id });
  showScreen('roleScreen');
  log('👋 Left stream');
}

function cleanupViewer() {
  if (peerConns['host']) { try { peerConns['host'].close(); } catch{} delete peerConns['host']; }
  document.getElementById('viewerVideo').srcObject = null;
  document.getElementById('waitingBox').style.display = 'flex';
}

// ── Chat ───────────────────────────────────────────────────────────────────
function sendChat(who) {
  const inputId = who === 'host' ? 'hostChatInput' : 'viewerChatInput';
  const msg = document.getElementById(inputId).value.trim();
  if (!msg || !streamId) return;
  socket.emit('livestream_chat', { streamId, message: msg, userId: currentUser.id });
  document.getElementById(inputId).value = '';
}

function addChatMessage(target, name, text, isSystem) {
  const msg = document.createElement('div');
  msg.className = 'chat-msg' + (isSystem ? ' system' : '');
  if (isSystem) {
    msg.textContent = text;
  } else {
    msg.innerHTML = `<span class="name">${name}</span> ${text}`;
  }
  if (target === 'host' || target === 'both') {
    const c = document.getElementById('hostChat');
    c.appendChild(msg.cloneNode(true));
    c.scrollTop = c.scrollHeight;
  }
  if (target === 'viewer' || target === 'both') {
    const c = document.getElementById('viewerChat');
    c.appendChild(msg.cloneNode(true));
    c.scrollTop = c.scrollHeight;
  }
}

// ── Reactions ──────────────────────────────────────────────────────────────
function sendReaction(emoji) {
  if (!streamId) return;
  socket.emit('livestream_reaction', { streamId, emoji });
}

function spawnFloatingReaction(emoji) {
  const container = role === 'host'
    ? document.getElementById('hostFloats')
    : document.getElementById('viewerFloats');
  if (!container) return;
  const el = document.createElement('div');
  el.className = 'float-reaction';
  el.textContent = emoji;
  el.style.left = `${Math.floor(Math.random() * 70) + 10}%`;
  container.appendChild(el);
  setTimeout(() => el.remove(), 2900);
}

// ── Mute / Video controls ──────────────────────────────────────────────────
function toggleMute() {
  if (!localStream) return;
  const track = localStream.getAudioTracks()[0];
  if (track) {
    isMuted = !isMuted;
    track.enabled = !isMuted;
    document.getElementById('muteBtn').textContent = isMuted ? '🔇 Unmute' : '🎤 Mute';
  }
}

function toggleVideo() {
  if (!localStream) return;
  const track = localStream.getVideoTracks()[0];
  if (track) {
    isVideoOff = !isVideoOff;
    track.enabled = !isVideoOff;
    document.getElementById('videoBtn').textContent = isVideoOff ? '📷 Video On' : '📷 Video Off';
  }
}

// ── Viewer List Modal ──────────────────────────────────────────────────────
function toggleViewerModal() {
  const modal = document.getElementById('viewerModal');
  modal.style.display = modal.style.display === 'none' ? 'flex' : 'none';
}

function updateViewerList() {
  const list = document.getElementById('viewerList');
  const count = Object.keys(viewers).length;
  document.getElementById('modalViewerCount').textContent = count;

  if (count === 0) {
    list.innerHTML = '<p style="color:#888;font-size:13px">No viewers yet</p>';
    return;
  }
  list.innerHTML = '';
  Object.entries(viewers).forEach(([uid, name]) => {
    const row = document.createElement('div');
    row.className = 'viewer-row';
    row.innerHTML = `<div class="v-avatar">${name[0]?.toUpperCase()}</div><span>${name}</span>`;
    list.appendChild(row);
  });
}

// ── API Helper ─────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const res = await fetch(`${API}${path}`, {
    method,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || data.message || `HTTP ${res.status}`);
  return data;
}
