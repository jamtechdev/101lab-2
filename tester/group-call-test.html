<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VMT Group Call — Web Test</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #0d0d0d; color: #fff; min-height: 100vh; }

    .screen { display: none; }
    .screen.active { display: flex; }

    /* ── LOGIN ── */
    #loginScreen { justify-content: center; align-items: center; height: 100vh; background: #111; }
    .card { background: #1e1e1e; border-radius: 16px; padding: 36px; width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,.5); }
    .card h2 { text-align: center; margin-bottom: 6px; font-size: 22px; }
    .card p { text-align: center; color: #888; font-size: 13px; margin-bottom: 24px; }
    input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid #333; background: #2a2a2a; color: #fff; font-size: 14px; margin-bottom: 12px; outline: none; }
    input:focus { border-color: #0a84ff; }
    .btn { padding: 12px 18px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
    .btn:active { opacity: .75; }
    .btn-primary { background: #0a84ff; color: #fff; }
    .btn-green { background: #30d158; color: #fff; }
    .btn-red { background: #ff453a; color: #fff; }
    .btn-gray { background: #3a3a3c; color: #fff; }
    .btn-full { width: 100%; }
    .err { color: #ff453a; font-size: 13px; text-align: center; margin-top: 8px; min-height: 18px; }

    /* ── ROLE SELECT ── */
    #roleScreen { justify-content: center; align-items: center; height: 100vh; flex-direction: column; background: #111; gap: 16px; }
    #roleScreen h2 { font-size: 20px; margin-bottom: 8px; }
    .role-btn { width: 280px; padding: 18px; border-radius: 14px; font-size: 16px; font-weight: 700; border: none; cursor: pointer; }

    /* ── GROUP CALL SCREEN ── */
    #groupCallScreen { flex-direction: column; height: 100vh; background: #000; position: relative; }
    /* ── VIDEO GRID LAYOUT ── */
    .call-grid {
      flex: 1;
      position: relative;
      overflow-y: auto;
      background: #000;
      padding-top: 80px;
      padding-bottom: 140px;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 1px;
    }
    .video-tile {
      position: relative;
      background: #222;
      overflow: hidden;
      flex: 1;
      min-width: 200px;
      aspect-ratio: 3/4;
    }
    .video-tile video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      display: block;
    }
    .video-tile.no-video {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }
    .video-label {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: rgba(0,0,0,.6);
      color: #fff;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      max-width: calc(100% - 40px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mute-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #FF3B30;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    /* ── LOCAL PiP ── */
    .local-pip {
      position: fixed;
      bottom: 150px;
      right: 16px;
      width: 100px;
      height: 140px;
      border-radius: 12px;
      overflow: hidden;
      border: 3px solid #fff;
      background: #222;
      z-index: 40;
      display: none;
      flex-direction: column;
    }
    .local-pip.show {
      display: flex;
    }
    .local-pip video {
      flex: 1;
      object-fit: cover;
      width: 100%;
      transform: scaleX(-1); /* mirror */
    }
    .local-pip .label {
      background: rgba(0,0,0,.5);
      color: #fff;
      font-size: 10px;
      text-align: center;
      padding: 3px;
      font-weight: 600;
    }
    .local-pip .mute-indicator {
      position: absolute;
      top: 6px;
      right: 6px;
      background: #FF3B30;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    /* ── WAITING SCREEN ── */
    .waiting-overlay {
      position: fixed;
      top: 80px;
      left: 0;
      right: 0;
      bottom: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 5;
    }
    .waiting-overlay video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.4;
      z-index: 1;
    }
    .waiting-banner {
      position: relative;
      z-index: 2;
      background: rgba(0,0,0,.6);
      padding: 12px 24px;
      border-radius: 24px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
    }

    /* ── HEADER ── */
    .call-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(rgba(0,0,0,.7), transparent);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 35;
      padding-top: 16px;
    }
    .header-title {
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,.7);
    }
    .header-timer {
      color: rgba(255,255,255,.9);
      font-size: 13px;
      margin-top: 3px;
      font-family: monospace;
    }
    .header-count {
      color: rgba(255,255,255,.6);
      font-size: 11px;
      margin-top: 2px;
    }

    /* ── CONTROLS ── */
    .call-bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 140px;
      background: linear-gradient(transparent, rgba(0,0,0,.95));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 35;
      padding-bottom: 20px;
      gap: 14px;
    }
    .ctrl-row {
      display: flex;
      gap: 20px;
      justify-content: center;
      width: 100%;
    }
    .ctrl-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      border: none;
      background: none;
      cursor: pointer;
    }
    .ctrl-circle {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: rgba(255,255,255,.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: background .2s;
    }
    .ctrl-circle.active {
      background: #FF3B30;
    }
    .ctrl-label {
      color: #fff;
      font-size: 10px;
      font-weight: 600;
    }

    /* ── PARTICIPANTS LIST ── */
    #participantsList { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,.7); border-radius: 12px; padding: 12px; max-width: 200px; max-height: 300px; overflow-y: auto; z-index: 10; }
    #participantsList h3 { font-size: 14px; margin-bottom: 8px; }
    .participant-item { padding: 6px; font-size: 12px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    .participant-item:last-child { border-bottom: none; }
    .status-badge { width: 8px; height: 8px; border-radius: 50%; background: #30d158; }
    .status-badge.offline { background: #ff453a; }

    /* ── GROUP CALL INDICATOR ── */
    #groupCallIndicatorModal {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,.6);
      display: none;
      z-index: 500;
      padding: 20px;
      border-top: 1px solid #333;
    }
    #groupCallIndicatorModal.active {
      display: block;
    }
    .group-call-indicator-box {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
      border: 2px solid #30d158;
    }
    .group-call-indicator-box .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      font-weight: 700;
      font-size: 14px;
      color: #30d158;
    }
    .group-call-indicator-box .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #30d158;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .group-call-indicator-box .title {
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .group-call-indicator-box .info {
      color: #888;
      font-size: 13px;
      margin-bottom: 14px;
    }
    .group-call-indicator-box .buttons {
      display: flex;
      gap: 10px;
    }

    /* ── LOG ── */
    #logBox { position: fixed; bottom: 0; right: 0; width: 300px; max-height: 160px; overflow-y: auto; background: rgba(0,0,0,.85); font-size: 10px; padding: 6px; font-family: monospace; color: #0f0; z-index: 200; border-top-left-radius: 8px; }
  </style>
</head>
<body>

<!-- ══════════════════ LOGIN ══════════════════ -->
<div id="loginScreen" class="screen active">
  <div class="card">
    <h2>👥 Group Call Test</h2>
    <p>Web Test Client</p>
    <input id="emailInput" type="email" placeholder="Email" />
    <input id="passwordInput" type="password" placeholder="Password" />
    <button class="btn btn-primary btn-full" onclick="login()">Login</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- ══════════════════ ROLE SELECT ══════════════════ -->
<div id="roleScreen" class="screen">
  <h2 id="roleGreet">Welcome!</h2>
  <button class="role-btn btn-green" onclick="showScreen('conversationScreen')">🎥 Start Group Call</button>
  <button class="role-btn btn-primary" onclick="logout()" style="margin-top:20px;">🚪 Logout</button>
</div>

<!-- ══════════════════ CONVERSATION SELECT SCREEN ══════════════════ -->
<div id="conversationScreen" class="screen" style="justify-content:center;align-items:center;height:100vh;background:#111;flex-direction:column;gap:14px;padding:20px;">
  <div class="card" style="width:100%;max-width:500px;">
    <h2>👥 Select Conversation</h2>
    <p>Choose a group to start/join call</p>
    <div id="conversationList" style="max-height:400px;overflow-y:auto;margin-bottom:14px;"></div>
    <button class="btn btn-gray btn-full" onclick="showScreen('roleScreen')">← Back</button>
    <div class="err" id="convErr"></div>
  </div>
</div>

<!-- ══════════════════ INCOMING GROUP CALL SCREEN ══════════════════ -->
<div id="incomingGroupCallScreen" class="screen" style="justify-content:space-between;align-items:center;height:100vh;background:linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);flex-direction:column;padding:20px;">
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;">
    <div style="font-size:80px;margin-bottom:20px;">📞</div>
    <div style="font-size:24px;font-weight:bold;margin-bottom:8px;" id="incomingGroupTitle">Group Call</div>
    <div style="font-size:16px;color:#888;margin-bottom:20px;" id="incomingCallerName">User is calling</div>
    <div style="font-size:14px;color:#aaa;" id="incomingCallType">Video Call</div>
  </div>

  <div style="display:flex;gap:20px;width:100%;margin-bottom:40px;justify-content:center;">
    <button class="btn btn-red" style="width:120px;padding:16px;" onclick="declineIncomingCall()">
      Decline
    </button>
    <button class="btn btn-green" style="width:120px;padding:16px;" onclick="acceptIncomingCall()">
      Join
    </button>
  </div>
</div>

<!-- ══════════════════ GROUP CALL SCREEN ══════════════════ -->
<div id="groupCallScreen" class="screen">
  <!-- HEADER -->
  <div class="call-header">
    <div class="header-title" id="callTitle">Group Video Call</div>
    <div class="header-timer" id="callTimer">00:00</div>
    <div class="header-count" id="participantCount"></div>
  </div>

  <!-- WAITING SCREEN (when 0 remote) -->
  <div class="waiting-overlay" id="waitingOverlay">
    <video id="localVideoWaiting" autoplay muted playsinline></video>
    <div class="waiting-banner">Waiting for others to join…</div>
  </div>

  <!-- VIDEO GRID (shown when 1+ remote) -->
  <div class="call-grid" id="callGrid"></div>

  <!-- LOCAL PiP (shown when 1+ remote) -->
  <div class="local-pip" id="localPip">
    <video id="localVideoPip" autoplay muted playsinline></video>
    <div class="mute-indicator" id="pipMuteIndicator" style="display:none;">🔇</div>
    <div class="label">You</div>
  </div>

  <!-- CONTROLS -->
  <div class="call-bottom">
    <div class="ctrl-row">
      <button class="ctrl-btn" onclick="toggleMute()" title="Mute/Unmute">
        <div class="ctrl-circle" id="muteCircle">
          <span id="muteIcon">🎤</span>
        </div>
        <span class="ctrl-label" id="muteLabel">Mute</span>
      </button>

      <button class="ctrl-btn" onclick="toggleVideo()" title="Start/Stop Video">
        <div class="ctrl-circle" id="videoCircle">
          <span id="videoIcon">📷</span>
        </div>
        <span class="ctrl-label" id="videoLabel">Stop</span>
      </button>

      <button class="ctrl-btn" onclick="flipCamera()" title="Flip Camera">
        <div class="ctrl-circle">
          <span>🔄</span>
        </div>
        <span class="ctrl-label">Flip</span>
      </button>

      <button class="ctrl-btn" onclick="endGroupCall()" title="End Call">
        <div class="ctrl-circle" style="background:#FF3B30;">
          <span>📞</span>
        </div>
        <span class="ctrl-label">End</span>
      </button>
    </div>
  </div>

  <!-- DEBUG: Participants List (hidden) -->
  <div id="participantsList" style="display:none;">
    <h3>Participants</h3>
    <div id="participantsListContent"></div>
  </div>
</div>

<!-- ══════════════════ GROUP CALL INDICATOR ══════════════════ -->
<div id="groupCallIndicatorModal">
  <div class="group-call-indicator-box">
    <div class="status">
      <div class="pulse"></div>
      ACTIVE CALL
    </div>
    <div class="title" id="groupCallTitle">Group Call in Progress</div>
    <div class="info" id="groupCallInfo">👥 Click to join the conversation</div>
    <div class="buttons">
      <button class="btn btn-green" style="flex:1;" onclick="joinActiveGroupCall()">📞 Join Call</button>
      <button class="btn btn-gray" style="flex:1;" onclick="dismissGroupCallIndicator()">Dismiss</button>
    </div>
  </div>
</div>

<!-- ══════════════════ LOG ══════════════════ -->
<div id="logBox"></div>

<script>
const API = 'https://api.vmeeta.com';

// TURN credentials fetched dynamically (like the app does)
let iceConfig = {
  iceServers: [
    { urls: ['stun:stun.l.google.com:19302', 'stun:turn.vmeeta.com:3478'] }
  ],
  iceCandidatePoolSize: 10
};

async function fetchTurnCredentials() {
  try {
    const res = await fetch(`${API}/api/chat/new/turn-credentials`);
    const turn = await res.json();
    iceConfig = {
      iceServers: [
        { urls: ['stun:stun.l.google.com:19302', 'stun:turn.vmeeta.com:3478'] },
        {
          urls: [
            'turn:turn.vmeeta.com:3478?transport=udp',
            'turn:turn.vmeeta.com:3478?transport=tcp',
            'turns:turn.vmeeta.com:443?transport=tcp'
          ],
          username: String(turn.username || ''),
          credential: turn.credential || ''
        }
      ],
      iceCandidatePoolSize: 10
    };
    log('✅ TURN credentials fetched');
  } catch(e) {
    log('⚠️ TURN fetch failed, using STUN only', '#fa0');
  }
}

// ── State ──────────────────────────────────────────────────────────────────
let token = null;
let currentUser = null;
let socket = null;
let conversationId = null;
let localStream = null;

// ── Utilities ───────────────────────────────────────────────────────────────
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
let pcs = new Map(); // userId → RTCPeerConnection
let participants = new Map(); // userId → { name, isMuted, isVideoOff }
let iceQueues = new Map(); // userId → pending ICE candidates (from app's iceQueuesRef)
let isMuted = false;
let isVideoOff = false;
let isInCall = false;

// ── NEW: Group Call Indicator State ────────────────────────────────────────
let activeGroupCall = null; // { conversationId, hostName, participantCount }

// ── CALL TIMER ──────────────────────────────────────────────────────────────
let callStartTime = null;
let timerInterval = null;

// ── Logging ────────────────────────────────────────────────────────────────
function log(msg, color) {
  const el = document.getElementById('logBox');
  const line = document.createElement('div');
  line.style.color = color || '#0f0';
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
  console.log(msg);
}

// ── Screen helper ──────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  // Load conversations when showing conversation screen
  if (id === 'conversationScreen') {
    fetchConversations();
  }
}

// ── Auth ───────────────────────────────────────────────────────────────────
async function login() {
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value.trim();
  document.getElementById('loginErr').textContent = '';

  if (!email || !password) {
    document.getElementById('loginErr').textContent = 'Fill in all fields';
    return;
  }

  try {
    const res = await fetch(`${API}/email/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || data.error || 'Login failed');

    token = data.accessToken;
    currentUser = data.user;
    if (!currentUser) throw new Error('Login response missing user data');

    log(`✅ Logged in as ${currentUser.fullName || currentUser.username}`);

    document.getElementById('roleGreet').textContent = `Hi ${currentUser.fullName || currentUser.username} 👋`;
    connectSocket();
    showScreen('roleScreen');
  } catch(e) {
    document.getElementById('loginErr').textContent = e.message;
    log(`❌ Login error: ${e.message}`, '#f55');
  }
}

// ── Logout ──────────────────────────────────────────────────────────────────
function logout() {
  token = null;
  currentUser = null;
  conversationId = null;
  if (socket) socket.disconnect();
  showScreen('loginScreen');
  document.getElementById('loginErr').textContent = '';
  document.getElementById('emailInput').value = '';
  document.getElementById('passwordInput').value = '';
}

// ── FETCH CONVERSATIONS ─────────────────────────────────────────────────────
async function fetchConversations() {
  const listEl = document.getElementById('conversationList');
  const errEl = document.getElementById('convErr');

  errEl.textContent = '';
  listEl.innerHTML = '<p style="color:#888;text-align:center;padding:20px;">Loading conversations...</p>';

  try {
    const res = await fetch(`${API}/api/chat/conversations`, {
      method: 'GET',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      }
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || data.message || 'Failed to fetch conversations');

    const conversations = data.conversations || data || [];
    if (!Array.isArray(conversations) || conversations.length === 0) {
      listEl.innerHTML = '<p style="color:#888;text-align:center;padding:20px;">No conversations found</p>';
      return;
    }

    // Clear and populate list
    listEl.innerHTML = '';
    conversations.forEach(conv => {
      const convId = conv.id;
      const convTitle = conv.title || (conv.participants && conv.participants.map(p => p.fullName || p.username).join(', ')) || 'Unnamed';
      const memberCount = (conv.participants && conv.participants.length) || 2;

      const item = document.createElement('div');
      item.style.cssText = `
        padding:12px;
        background:#1a1a1a;
        border:1px solid #333;
        border-radius:8px;
        margin-bottom:10px;
        cursor:pointer;
        transition:all 0.2s;
        display:flex;
        justify-content:space-between;
        align-items:center;
      `;
      item.innerHTML = `
        <div>
          <div style="font-weight:bold;color:#fff;">${escapeHtml(convTitle)}</div>
          <div style="font-size:12px;color:#888;">${memberCount} member${memberCount !== 1 ? 's' : ''}</div>
        </div>
        <div style="font-size:12px;color:#0a84ff;font-family:monospace;">${convId}</div>
      `;

      item.onmouseover = () => {
        item.style.background = '#222';
        item.style.borderColor = '#0a84ff';
      };
      item.onmouseout = () => {
        item.style.background = '#1a1a1a';
        item.style.borderColor = '#333';
      };

      item.onclick = () => selectConversation(convId, convTitle);
      listEl.appendChild(item);
    });

    log(`✅ Fetched ${conversations.length} conversations`);
  } catch(e) {
    errEl.textContent = e.message;
    listEl.innerHTML = '';
    log(`❌ Failed to fetch conversations: ${e.message}`, '#f55');
  }
}

// ── SELECT CONVERSATION ─────────────────────────────────────────────────────
function selectConversation(convId, convTitle) {
  conversationId = convId;
  log(`✅ Selected conversation: ${convTitle} (${convId})`);
  startGroupCall();
}

// ── Socket ─────────────────────────────────────────────────────────────────
function connectSocket() {
  socket = io(API, { transports: ['websocket', 'polling'], reconnection: true });

  socket.on('connect', () => {
    log(`🔌 Socket connected: ${socket.id}`);
    // Match app's registration method
    socket.emit('register', currentUser.id);
    socket.emit('presence:online', { userId: currentUser.id });
  });

  socket.on('disconnect', () => log('❌ Socket disconnected', '#f55'));

  // ── DEBUG: Catch-all listener to see what events backend sends ──
  socket.onAny((eventName, ...args) => {
    if (eventName.includes('group_call') || eventName.includes('signal') || eventName.includes('webrtc')) {
      log(`🔍 Event: ${eventName}`, '#ff9');
    }
  });

  // ── Incoming group call notification (when someone starts a call with you) ──
  socket.on('group_call_user', (data) => {
    log(`📞 Incoming group call from ${data.fromName || data.userName || 'Unknown'}`, '#0f0');

    // Ignore if we're already in a call or if we initiated this call
    if (isInCall || String(currentUser.id) === String(data.from)) {
      log(`⚠️ Ignoring incoming call (already in call or self-initiated)`);
      return;
    }

    // Store incoming call data
    window.incomingCall = data;

    // Show incoming call screen
    document.getElementById('incomingGroupTitle').textContent = data.groupTitle || 'Group Call';
    document.getElementById('incomingCallerName').textContent = `${data.fromName || 'Unknown'} is calling`;
    document.getElementById('incomingCallType').textContent = (data.callType === 'video' ? '📹 Video' : '📞 Audio') + ' Call';

    showScreen('incomingGroupCallScreen');
  });

  // ── Helper to add participant ──
  const handleParticipantJoined = ({ userId, userName, userProfilePic }) => {
    if (String(userId) === String(currentUser.id)) return; // Ignore self
    log(`👤 Participant joined: ${userName} (${userId})`);
    if (!participants.has(userId)) {
      participants.set(userId, {
        userId,
        userName,
        userProfilePic,
        isMuted: false,
        isVideoOff: false,
        status: 'online'
      });
      updateParticipantsList();
      connectToPeer(userId);
      log(`🔗 Connected to ${userName}`);
    }
  };

  const handleCurrentParticipants = ({ participants: existing = [] }) => {
    log(`📥 Current participants: ${existing.length}`);
    existing.forEach(p => {
      if (String(p.userId) !== String(currentUser.id)) {
        if (!participants.has(p.userId)) {
          participants.set(p.userId, {
            ...p,
            status: 'online',
            isMuted: false,
            isVideoOff: false
          });
          connectToPeer(p.userId);
        }
      }
    });
    updateParticipantsList();
    updateCallLayout();
  };

  // ── Group call events (multiple variants for backend compatibility) ──
  socket.on('group_call_participant_joined', handleParticipantJoined);
  socket.on('group_call_user_joined', handleParticipantJoined); // backend might use this

  socket.on('group_call_current_participants', handleCurrentParticipants);
  socket.on('group_call_participants', handleCurrentParticipants); // variant

  socket.on('group_call_participant_left', ({ userId }) => {
    log(`👤 Participant left: ${userId}`);
    removePeer(userId);  // ← ISSUE #1: What if this fires twice?
  });
  socket.on('group_call_user_left', ({ userId }) => {
    log(`👤 User left: ${userId}`);
    removePeer(userId);
  });

  socket.on('group_call_signal', async (data) => {
    const { from, type, signal } = data;
    if (type === 'offer') {
      await handleOffer(from, signal);
    } else if (type === 'answer') {
      await handleAnswer(from, signal);
    } else if (type === 'ice') {
      await handleICE(from, signal);
    }
  });
  socket.on('webrtc_signal', async (data) => {  // backend might use this
    const { from, type, signal } = data;
    if (type === 'offer') {
      await handleOffer(from, signal);
    } else if (type === 'answer') {
      await handleAnswer(from, signal);
    } else if (type === 'ice') {
      await handleICE(from, signal);
    }
  });
  socket.on('signal', async (data) => {  // or this generic name
    const { from, type, signal } = data;
    if (type === 'offer') {
      await handleOffer(from, signal);
    } else if (type === 'answer') {
      await handleAnswer(from, signal);
    } else if (type === 'ice') {
      await handleICE(from, signal);
    }
  });

  socket.on('group_call_ended', () => {
    log('📵 Group call ended by host');
    setActiveGroupCall(null); // Clear indicator
    if (isInCall) endGroupCall();
  });

  // ── Mute/Video status updates ──
  socket.on('group_call_mute_update', ({ userId, isMuted }) => {
    log(`🔇 ${userId} ${isMuted ? 'muted' : 'unmuted'}`);
    updateRemoteMuteStatus(userId, isMuted);
  });

  socket.on('group_call_video_update', ({ userId, isVideoOff }) => {
    log(`📷 ${userId} video ${isVideoOff ? 'off' : 'on'}`);
    updateRemoteVideoStatus(userId, isVideoOff);
  });

  // ── Group call indicator for other users ──
  socket.on('group_call_started', (data) => {
    // A group call has started - show indicator if not already in it
    if (String(currentUser.id) !== String(data.hostId)) {
      setActiveGroupCall({
        conversationId: data.conversationId,
        hostName: data.hostName,
        participantCount: data.participantCount || 1
      });
    }
  });

  socket.on('group_call_participants_updated', (data) => {
    // Update participant count in indicator
    if (activeGroupCall && activeGroupCall.conversationId === data.conversationId) {
      activeGroupCall.participantCount = data.participantCount;
      updateGroupCallIndicator();
    }
  });
}

// ── START CALL TIMER ───────────────────────────────────────────────────────
function startCallTimer() {
  callStartTime = Date.now();
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
    const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const secs = String(elapsed % 60).padStart(2, '0');
    document.getElementById('callTimer').textContent = `${mins}:${secs}`;
  }, 1000);
}

async function startGroupCall() {

  if (!conversationId) {
    log('❌ No conversation selected', '#f55');
    alert('Please select a conversation first');
    showScreen('conversationScreen');
    return;
  }

  await fetchTurnCredentials();
  await initLocalStream();

  // Emit group_call_user to notify all group members

    from: currentUser.id,

    fromProfilePic: currentUser.profilePic,

    callType: 'video',

  });

    conversationId,
    userId: currentUser.id,
    userName: currentUser.fullName,
    userProfilePic: currentUser.profilePic,

  });

// ── Initialize Local Stream ────────────────────────────────────────────────
async function initLocalStream() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    log('📷 Local stream initialized');
  } catch(e) {
    log(`⚠️ Camera error: ${e.message}`, '#fa0');
    // Fallback to fake stream
    localStream = createFakeStream();
  }
}

// ── Fake Stream ────────────────────────────────────────────────────────────
function createFakeStream() {
  const canvas = document.createElement('canvas');
  canvas.width = 640;
  canvas.height = 480;
  const ctx = canvas.getContext('2d');
  let frame = 0;

  function draw() {
    frame++;
    const grad = ctx.createLinearGradient(0, 0, 640, 480);
    grad.addColorStop(0, `hsl(${frame % 360}, 70%, 20%)`);
    grad.addColorStop(1, `hsl(${(frame + 120) % 360}, 70%, 10%)`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 640, 480);

    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = 'bold 48px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🎥 GROUP CALL', 320, 200);

    ctx.font = '22px monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText(new Date().toLocaleTimeString(), 320, 260);

    requestAnimationFrame(draw);
  }
  draw();

  const videoTrack = canvas.captureStream(30).getVideoTracks()[0];
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const dest = audioCtx.createMediaStreamDestination();
  const audioTrack = dest.stream.getAudioTracks()[0];

  return new MediaStream([videoTrack, audioTrack]);
}

// ── Polite/Impolite Rule ───────────────────────────────────────────────────
function iAmOfferer(peerId) {
  const myId = String(currentUser?.id ?? "");
  const isOfferer = myId < String(peerId);
  log(`🤝 Polite/Impolite: ${myId} vs ${peerId} → I am ${isOfferer ? 'OFFERER' : 'IMPOLITE (wait)'}`, '#99f');
  return isOfferer;
}

// ── Connect to Peer ────────────────────────────────────────────────────────
async function connectToPeer(peerId) {
  if (iAmOfferer(peerId)) {
    log(`📤 Creating offer for ${peerId}`);
    await createOffer(peerId);
  } else {
    log(`📥 Waiting for offer from ${peerId}`);

    // 🔥 FALLBACK: If no offer arrives within 5 seconds, create one ourselves
    // This prevents deadlock if both sides think the other should offer
    setTimeout(() => {
      const pc = pcs.get(peerId);
      if (pc && pc.signalingState === 'stable' && !pc.remoteDescription) {
        log(`⏱️ No offer from ${peerId} after 5s - creating backup offer`, '#ff9');
        createOffer(peerId);
      }
    }, 5000);
  }
}

// ── Create Offer ───────────────────────────────────────────────────────────
async function createOffer(peerId) {
  const pc = getOrCreatePC(peerId);

  try {
    const offer = await pc.createOffer({
      offerToReceiveAudio: true,
      offerToReceiveVideo: true
    });
    await pc.setLocalDescription(offer);

    socket.emit('group_call_signal', {
      conversationId,
      from: currentUser.id,
      to: peerId,
      type: 'offer',
      signal: offer
    });

    log(`✅ Offer sent to ${peerId}`);
  } catch(e) {
    // ISSUE #6: No error recovery!
    log(`❌ Offer error: ${e.message}`, '#f55');
  }
}

// ── Flush Queued ICE Candidates (from app's flushQueue logic) ──────────────
async function flushQueue(fromId) {
  const pc = pcs.get(fromId);
  if (!pc?.remoteDescription) return;

  const queue = iceQueues.get(fromId) || [];
  iceQueues.set(fromId, []);

  for (const candidate of queue) {
    try {
      await pc.addIceCandidate(new RTCIceCandidate(candidate));
      log(`✅ Flushed ICE candidate for ${fromId}`);
    } catch(e) {
      log(`⚠️ Failed to add queued ICE: ${e.message}`, '#fa0');
    }
  }
}

// ── Handle Offer ───────────────────────────────────────────────────────────
async function handleOffer(fromId, offer) {
  const pc = getOrCreatePC(fromId);

  try {
    log(`📥 [handleOffer] Setting remote description for ${fromId}`);
    await pc.setRemoteDescription(new RTCSessionDescription(offer));

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    socket.emit('group_call_signal', {
      conversationId,
      from: currentUser.id,
      to: fromId,
      type: 'answer',
      signal: answer
    });

    log(`✅ Answer sent to ${fromId}`);

    // CRITICAL: Flush any queued ICE candidates now that remote description is set
    await flushQueue(fromId);
  } catch(e) {
    log(`❌ Handle offer error: ${e.message}`, '#f55');
  }
}

// ── Handle Answer ──────────────────────────────────────────────────────────
async function handleAnswer(fromId, answer) {
  const pc = pcs.get(fromId);
  if (pc) {
    try {
      log(`📥 [handleAnswer] Setting remote description for ${fromId}`);
      await pc.setRemoteDescription(new RTCSessionDescription(answer));
      log(`✅ Answer received from ${fromId}`);

      // CRITICAL: Flush any queued ICE candidates now that remote description is set
      await flushQueue(fromId);
    } catch(e) {
      log(`❌ Answer error: ${e.message}`, '#f55');
    }
  }
}

// ── Handle ICE ─────────────────────────────────────────────────────────────
async function handleICE(fromId, candidate) {
  const pc = pcs.get(fromId);
  if (pc) {
    try {
      if (pc.remoteDescription) {
        // Remote description ready → add immediately
        await pc.addIceCandidate(new RTCIceCandidate(candidate));
        log(`✅ ICE candidate added for ${fromId}`);
      } else {
        // Remote description NOT ready → queue the candidate for later
        const queue = iceQueues.get(fromId) || [];
        queue.push(candidate);
        iceQueues.set(fromId, queue);
        log(`📦 ICE candidate queued for ${fromId} (queue size: ${queue.length})`, '#99f');
      }
    } catch(e) {
      log(`⚠️ ICE error: ${e.message}`, '#fa0');
    }
  }
}

// ── Get or Create PC ───────────────────────────────────────────────────────
function getOrCreatePC(peerId) {
  if (pcs.has(peerId)) return pcs.get(peerId);

  const pc = new RTCPeerConnection(iceConfig);

  // Add local tracks
  if (localStream) {
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  }

  // Receive remote stream
  pc.ontrack = (e) => {
    log(`🎥 Remote stream from ${peerId}`);
    const remote = e.streams?.[0];
    if (remote) {
      addRemoteVideo(peerId, remote);
    }
  };

  // Send ICE candidates
  pc.onicecandidate = (e) => {
    if (e.candidate) {
      socket.emit('group_call_signal', {
        conversationId,
        from: currentUser.id,
        to: peerId,
        type: 'ice',
        signal: e.candidate
      });
    }
  };

  pcs.set(peerId, pc);
  return pc;
}

// ── ADD REMOTE VIDEO ───────────────────────────────────────────────────────
function addRemoteVideo(userId, stream) {
  let tile = document.getElementById(`video-${userId}`);

  if (!tile) {
    tile = document.createElement('div');
    tile.id = `video-${userId}`;
    tile.className = 'video-tile';

    const video = document.createElement('video');
    video.autoplay = true;
    video.playsinline = true;
    video.srcObject = stream;

    const label = document.createElement('div');
    label.className = 'video-label';
    const participant = participants.get(userId);
    label.textContent = participant?.userName || userId;

    const muteBadge = document.createElement('div');
    muteBadge.className = 'mute-badge';
    muteBadge.id = `mute-badge-${userId}`;
    muteBadge.textContent = '🔇';
    muteBadge.style.display = participant?.isMuted ? 'flex' : 'none';

    tile.appendChild(video);
    tile.appendChild(label);
    tile.appendChild(muteBadge);

    // Video off state
    if (participant?.isVideoOff) {
      tile.classList.add('no-video');
      tile.textContent = '👤';
    }

    document.getElementById('callGrid').appendChild(tile);

    log(`✅ Video tile added for ${userId}`);
    updateCallLayout();
  }
}

// ── UPDATE CALL LAYOUT ──────────────────────────────────────────────────────
function updateCallLayout() {
  const remoteCount = [...pcs.keys()].length;
  const waitingOverlay = document.getElementById('waitingOverlay');
  const callGrid = document.getElementById('callGrid');
  const localPip = document.getElementById('localPip');
  const headerCount = document.getElementById('participantCount');

  if (remoteCount === 0) {
    // Show waiting screen
    waitingOverlay.style.display = 'flex';
    callGrid.innerHTML = '';
    localPip.classList.remove('show');
    headerCount.textContent = '';

    // Show local video in waiting overlay
    if (localStream && !isVideoOff) {
      document.getElementById('localVideoWaiting').srcObject = localStream;
    }
  } else {
    // Hide waiting screen, show grid
    waitingOverlay.style.display = 'none';
    localPip.classList.add('show');
    headerCount.textContent = `${remoteCount + 1} participants`;

    // Set local PiP stream
    if (localStream && !isVideoOff) {
      document.getElementById('localVideoPip').srcObject = localStream;
    }
  }
}

// ── Update Remote Mute Status ──────────────────────────────────────────────
function updateRemoteMuteStatus(userId, isMuted) {
  const tile = document.getElementById(`video-${userId}`);
  if (tile) {
    if (isMuted) {
      tile.classList.add('muted');
    } else {
      tile.classList.remove('muted');
    }
  }
  const p = participants.get(userId);
  if (p) p.isMuted = isMuted;
}

// ── Update Remote Video Status ────────────────────────────────────────────
function updateRemoteVideoStatus(userId, isVideoOff) {
  const tile = document.getElementById(`video-${userId}`);
  if (tile) {
    if (isVideoOff) {
      tile.classList.add('video-off');
    } else {
      tile.classList.remove('video-off');
    }
  }
  const p = participants.get(userId);
  if (p) p.isVideoOff = isVideoOff;
}

// ── REMOVE PEER ────────────────────────────────────────────────────────────
function removePeer(userId) {
  // ISSUE #1: What if this is called twice?
  const pc = pcs.get(userId);
  if (pc) {
    try { pc.close(); } catch {}
    pcs.delete(userId);
  }

  // Remove video tile
  const tile = document.getElementById(`video-${userId}`);
  if (tile) tile.remove();

  // ISSUE #2: What if user rejoins quickly and old entry still here?
  participants.delete(userId);
  updateParticipantsList();
  updateCallLayout(); // Refresh layout when someone leaves

  log(`👋 Peer removed: ${userId}`);
}

// ── Update Participants List ───────────────────────────────────────────────
function updateParticipantsList() {
  const content = document.getElementById('participantsListContent');
  content.innerHTML = '';

  participants.forEach((p) => {
    const item = document.createElement('div');
    item.className = 'participant-item';
    const status = p.status === 'online' ? '' : ' offline';
    item.innerHTML = `
      <span>${p.userName}</span>
      <div class="status-badge${status}"></div>
    `;
    content.appendChild(item);
  });
}

// ── TOGGLE MUTE ────────────────────────────────────────────────────────────
function toggleMute() {
  if (!localStream) return;
  const track = localStream.getAudioTracks()[0];
  if (track) {
    isMuted = !isMuted;
    track.enabled = !isMuted;

    // Update UI
    const muteCircle = document.getElementById('muteCircle');
    const muteIcon = document.getElementById('muteIcon');
    const muteLabel = document.getElementById('muteLabel');
    const pipMuteIndicator = document.getElementById('pipMuteIndicator');

    if (isMuted) {
      muteCircle.classList.add('active');
      muteIcon.textContent = '🔇';
      muteLabel.textContent = 'Unmute';
      pipMuteIndicator.style.display = 'flex';
    } else {
      muteCircle.classList.remove('active');
      muteIcon.textContent = '🎤';
      muteLabel.textContent = 'Mute';
      pipMuteIndicator.style.display = 'none';
    }

    // Update local tile visual
    updateRemoteMuteStatus(currentUser.id, isMuted);

    socket.emit('group_call_mute_update', {
      conversationId,
      userId: currentUser.id,
      isMuted
    });
  }
}

// ── TOGGLE VIDEO ────────────────────────────────────────────────────────────
function toggleVideo() {
  if (!localStream) return;
  const track = localStream.getVideoTracks()[0];
  if (track) {
    isVideoOff = !isVideoOff;
    track.enabled = !isVideoOff;

    // Update UI
    const videoCircle = document.getElementById('videoCircle');
    const videoIcon = document.getElementById('videoIcon');
    const videoLabel = document.getElementById('videoLabel');

    if (isVideoOff) {
      videoCircle.classList.add('active');
      videoIcon.textContent = '📹';
      videoLabel.textContent = 'Start';
    } else {
      videoCircle.classList.remove('active');
      videoIcon.textContent = '📷';
      videoLabel.textContent = 'Stop';
    }

    // Update local tile visual
    updateRemoteVideoStatus(currentUser.id, isVideoOff);
    updateCallLayout(); // Refresh layout

    socket.emit('group_call_video_update', {
      conversationId,
      userId: currentUser.id,
      isVideoOff
    });
  }
}

// ── END GROUP CALL ────────────────────────────────────────────────────────
function endGroupCall() {
  // Stop timer
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }

  // ISSUE #8: No cleanup of peer connections!
  pcs.forEach(pc => { try { pc.close(); } catch {} });
  pcs.clear();

  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }

  // Backend listens to group_call_leave (not group_call_end)
  socket.emit('group_call_leave', { conversationId, userId: currentUser?.id });

  isInCall = false;
  participants.clear();
  iceQueues.clear();
  conversationId = null;
  setActiveGroupCall(null); // Clear local indicator
  showScreen('roleScreen');
  log('📵 Group call ended');
}

// ── Group Call Indicator Management ────────────────────────────────────────
function updateGroupCallIndicator() {
  const modal = document.getElementById('groupCallIndicatorModal');
  if (activeGroupCall && !isInCall) {
    // Show indicator only if there's an active call and we're NOT in it
    modal.classList.add('active');
    document.getElementById('groupCallTitle').textContent = `Group Call by ${activeGroupCall.hostName}`;
    document.getElementById('groupCallInfo').textContent = `👥 ${activeGroupCall.participantCount} in call • Click to join`;
    log('🔔 Group call indicator shown');
  } else {
    modal.classList.remove('active');
  }
}

function setActiveGroupCall(callData) {
  activeGroupCall = callData;
  if (callData) {
    log(`🔔 Active group call: ${callData.conversationId} (host: ${callData.hostName})`);
  } else {
    log('🔔 Group call indicator cleared');
  }
  updateGroupCallIndicator();
}

function dismissGroupCallIndicator() {
  activeGroupCall = null;
  updateGroupCallIndicator();
  log('🔔 Indicator dismissed');
}

async function joinActiveGroupCall() {
  if (!activeGroupCall) return;

  document.getElementById('groupCallIdInput').value = activeGroupCall.conversationId;
  dismissGroupCallIndicator();
  await doJoinGroupCall();
}

// ── ACCEPT INCOMING GROUP CALL ──────────────────────────────────────────────
async function acceptIncomingCall() {
  if (!window.incomingCall) {
    log('❌ No incoming call data', '#f55');
    return;
  }

  const data = window.incomingCall;
  conversationId = data.conversationId;

  log(`✅ Accepting incoming group call from ${data.fromName}`, '#0f0');

  // CRITICAL: Init stream and TURN credentials BEFORE joining
  // so that when group_call_participants arrives and we create a PC,
  // localStream already has tracks to add
  await fetchTurnCredentials();
  await initLocalStream();

  // NOW join the call — backend will respond with group_call_participants
  socket.emit('group_call_join', {
    conversationId: data.conversationId,
    userId: currentUser.id,
    userName: currentUser.fullName,
    userProfilePic: currentUser.profilePic,
    callType: data.callType || 'video'
  });
  isInCall = true;
  showScreen('groupCallScreen');
  document.getElementById('callTitle').textContent = data.groupTitle || 'Group Call';
  startCallTimer();
  updateCallLayout();

  if (localStream) {
    document.getElementById('localVideoWaiting').srcObject = localStream;
  }

  window.incomingCall = null;
}

// ── DECLINE INCOMING GROUP CALL ─────────────────────────────────────────────
function declineIncomingCall() {
  if (!window.incomingCall) {
    showScreen('roleScreen');
    return;
  }

  const data = window.incomingCall;
  log(`❌ Declined incoming group call from ${data.fromName}`, '#fa0');

  // Notify backend
  socket.emit('group_call_leave', {
    conversationId: data.conversationId,
    userId: currentUser.id
  });

  window.incomingCall = null;
  showScreen('roleScreen');
}

// ── API Helper ─────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const res = await fetch(`${API}${path}`, {
    method,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || data.message || `HTTP ${res.status}`);
  return data;
}
